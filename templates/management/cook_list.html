{% extends "base.html" %}

{% block content %}
  <h1>Cooks: </h1>

  {% for cook in cook_list %}
    
      <a href="{{ cook.get_absolute_url }}">
      <li>
        {{ cook.first_name }} {{ cook.last_name }}
    </li>
    </a>
  {% empty %}
    <p>There no cooks in Kitchen </p>
  {% endfor %}


{% endblock content %}
