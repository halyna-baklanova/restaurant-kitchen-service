{% extends "base.html" %}

{% block content %}
  <h3>Dish: {{ dish.name }}</h3>
  <p>{{ dish.description }}</p>
  <p>Price: {{ dish.price }} $</p>
  <h3>Cooks:</h3>
  {% for cook in dish.cooks.all %}
    <a href="{{ cook.get_absolute_url }}">
    <h6>
    {{ cook.first_name }} {{ cook.last_name  }}
    </h6></a>
    <hr>
  {% empty %}
    <p>Dish no cooks</p>
  {% endfor %}

{% endblock content %}
