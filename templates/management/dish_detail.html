{% extends "base.html" %}

{% block content %}
  <h3>Dish: {{ dish.name }}<a href="{% url 'management:dish-delete' pk=dish.id %}" class="btn btn-danger link-to-page">
      Delete
    </a>

    <a href="{% url 'management:dish-update' pk=dish.id %}" class="btn btn-secondary link-to-page">
      Update
    </a></h3>
  <p>{{ dish.description }}</p>
  <p>Price: {{ dish.price }} $</p>
  <h3>Cooks:</h3>
  {% for cook in dish.cooks.all %}
    <a href="{{ cook.get_absolute_url }}">
    <h6>
    {{ cook.first_name }} {{ cook.last_name  }}
    </h6></a>
    <hr>
  {% empty %}
    <p>Dish no cooks yet.</p>
  {% endfor %}

{% endblock content %}
