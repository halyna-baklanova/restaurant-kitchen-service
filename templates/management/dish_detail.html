{% extends "base.html" %}

{% block content %}
  <h1>Dish: {{ dish.name }}</h1>
  <p>{{ dish.description }}</p>
  <p>{{ dish.price }}</p>
  <h3>Cooks:</h3>
  {% for cook in dish.cooks.all %}
    <hr>
    <p class="tx-muted">{{ dish.id }}</p>
    <p>{{ dish.name }}</p>
  {% empty %}
    <p>Dish no cooks</p>
  {% endfor %}

{% endblock content %}
